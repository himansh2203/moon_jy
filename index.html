<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Moon at Different Resolutions</title>

    <link rel="stylesheet" type="text/css" href="css/bootstrap.css">
</head>
<body>

    <nav class="navbar navbar-default">
        <div class="container-fluid">
            <a class="navbar-brand" href="https://sourcecodester.com">
                Moon Resolution Viewer
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-12 well">

                <h1 class="text-primary text-center">
                    MOON AT DIFFERENT RESOLUTIONS
                </h1>

                <hr style="border-top:1px dotted #ccc;">

                <div class="row">

                    <!-- Dropdown -->
                    <div class="col-md-3">
                        <div class="form-group text-center">
                            <label>Select Resolution</label>

                            <select id="choice" class="form-control" onchange="changeBackground()">
                                <option value="">Select an option</option>
                                <option value="moon144.jfif">Moon at 144p</option>
                                <option value="moon360.jfif">Moon at 360p</option>
                                <option value="moon720.jfif">Moon at 720p</option>
                                <option value="moon1080.jfif">Moon at 1080p</option>
                            </select>
                        </div>
                    </div>

                    <!-- Image Display Area -->
                    <div class="col-md-9">
                        <div id="result"
                             style="
                                height:400px;
                                border:1px solid #000;
                                display:flex;
                                align-items:center;
                                justify-content:center;
                                overflow:hidden;
                                background:#f8f8f8;
                             ">
                            <p>Select a resolution to view the image</p>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        function changeBackground() {
            var choice = document.getElementById("choice").value;
            var result = document.getElementById("result");

            if (choice !== "") {
                result.innerHTML = `
                    <img src="${choice}"
                         alt="Moon Image"
                         style="
                            max-width:100%;
                            max-height:100%;
                            object-fit:contain;
                         ">
                `;
            } else {
                result.innerHTML = "<p>Select a resolution to view the image</p>";
            }
        }
    </script>

</body>
</html>
